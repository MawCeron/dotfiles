[General]
enable-animations = true
background-fill-mode = fill

[LockScreen]
background = 001.jpg
blur = 0
brightness = -0.1
saturation = -0.2

[LockScreen.Clock]
position = center
align = center
format = "hh:mm"
font-family = "FiraCode Nerd Font"
font-size = 72
font-weight = 300
color = "#c8d4dc"

[LockScreen.Date]
format = "dddd, MMMM d"
locale = es_MX
font-family = "FiraCode Nerd Font"
font-size = 13
font-weight = 400
color = "#6878a0"
margin-top = -10

[LockScreen.Message]
position = bottom-center
text = "—"
display-icon = false
font-family = "FiraCode Nerd Font"
font-size = 11
color = "#3d444d"

[LoginScreen]
background = 001.jpg
blur = 20
brightness = -0.2
saturation = -0.3

[LoginScreen.LoginArea]
position = center
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = circle
active-size = 90
inactive-size = 60
inactive-opacity = 0.3
active-border-size = 1
active-border-color = "#6878a0"

[LoginScreen.LoginArea.Username]
font-family = "FiraCode Nerd Font"
font-size = 14
font-weight = 600
color = "#c8d4dc"

[LoginScreen.LoginArea.PasswordInput]
width = 220
height = 32
font-family = "FiraCode Nerd Font"
font-size = 12
display-icon = true
content-color = "#c8d4dc"
background-color = "#292c32"
background-opacity = 0.9
border-size = 1
border-color = "#3d444d"
border-radius-left = 4
border-radius-right = 0
margin-top = 12
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#6878a0"
background-opacity = 0.9
active-background-color = "#95a1aa"
active-background-opacity = 1.0
content-color = "#1c2127"
active-content-color = "#1c2127"
border-radius-left = 0
border-radius-right = 4
margin-left = 0
hide-if-not-needed = false

[LoginScreen.LoginArea.WarningMessage]
font-family = "FiraCode Nerd Font"
font-size = 11
normal-color = "#5a6570"
warning-color = "#c9a84c"
error-color = "#c96a6a"
margin-top = 8

[LoginScreen.LoginArea.Spinner]
font-family = "FiraCode Nerd Font"
font-size = 12
color = "#6878a0"

[LoginScreen.MenuArea.Buttons]
margin-bottom = 16
margin-left = 16
margin-right = 16
size = 28
border-radius = 4
spacing = 4

[LoginScreen.MenuArea.Popups]
background-color = "#292c32"
background-opacity = 0.95
active-option-background-color = "#3d444d"
active-option-background-opacity = 1.0
content-color = "#c8d4dc"
active-content-color = "#c8d4dc"
font-family = "FiraCode Nerd Font"
border-size = 1
border-color = "#3d444d"

[LoginScreen.MenuArea.Session]
position = bottom-left
content-color = "#5a6570"
active-content-color = "#c8d4dc"
font-size = 10
icon-size = 14

[LoginScreen.MenuArea.Layout]
position = bottom-right
content-color = "#5a6570"
active-content-color = "#c8d4dc"
font-size = 10
icon-size = 14

[LoginScreen.MenuArea.Keyboard]
position = bottom-right
content-color = "#5a6570"
active-content-color = "#c8d4dc"
icon-size = 14

[LoginScreen.MenuArea.Power]
position = bottom-right
content-color = "#5a6570"
active-content-color = "#c96a6a"
icon-size = 14

[LoginScreen.VirtualKeyboard]
start-hidden = true
background-color = "#292c32"
background-opacity = 0.95
key-content-color = "#c8d4dc"
key-color = "#313740"
key-opacity = 1.0
key-active-background-color = "#6878a0"
key-active-opacity = 1.0
border-size = 1
border-color = "#3d444d"

[Tooltips]
font-family = "FiraCode Nerd Font"
font-size = 11
content-color = "#c8d4dc"
background-color = "#292c32"
background-opacity = 0.95
border-radius = 4