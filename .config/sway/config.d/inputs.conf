#################################################
#           Input configuration                 #
#################################################

input type:touchpad {
    dwt enabled
    tap enabled
    tap_button_map lrm
    natural_scroll enabled
    middle_emulation enabled
}

# Teclado integrado (laptop) — reemplazar identifier con:
# swaymsg -t get_inputs | grep -E '"identifier"|"name"'
input "IDENTIFIER_LAPTOP_KEYBOARD" {
    xkb_numlock enabled
    xkb_layout  es
}

# Teclado mecánico (USB) — reemplazar identifier
input "IDENTIFIER_MECHANICAL_KEYBOARD" {
    xkb_numlock enabled
    xkb_layout  us
    xkb_variant intl
}