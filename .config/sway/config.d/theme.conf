#################################################
#                theme customization            #
#################################################
include ~/.config/sway/config.d/colors.conf

# Gaps
gaps inner 7
gaps outer 4

# Borders
default_border pixel 2
smart_borders off

# Focus
focus_follows_mouse no

# Title format
for_window [shell="xdg_shell"] title_format "%title (%app_id)"
for_window [shell="x_wayland"] title_format "%class - %title"

# Opacidad
set $opacity 1
for_window [class=".*"]  opacity $opacity
for_window [app_id=".*"] opacity $opacity

#----------------#
# GTK theme      #
#----------------#
set $gnome-schema org.gnome.desktop.interface
exec_always {
    gsettings set $gnome-schema gtk-theme      'Adwaita'
    gsettings set $gnome-schema color-scheme   'prefer-dark'
    gsettings set $gnome-schema cursor-theme   'Adwaita'
    gsettings set $gnome-schema icon-theme     'Papirus-Dark'
}

# Window decorations: border, background, text, indicator, child-border
client.focused          $cl_blue     $cl_base   $cl_text   $cl_blue     $cl_blue
client.focused_inactive $cl_mantle   $cl_base   $cl_text   $cl_mantle   $cl_mantle
client.unfocused        $cl_mantle   $cl_base   $cl_text   $cl_mantle   $cl_mantle
client.urgent           $cl_red      $cl_base   $cl_red    $cl_red      $cl_red
client.placeholder      $cl_surface1 $cl_base   $cl_text   $cl_surface1 $cl_surface1
client.background       $cl_base