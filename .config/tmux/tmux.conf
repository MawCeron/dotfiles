#####################################################
# Set default terminal
#####################################################
set -g default-terminal "foot"
set-option -ga terminal-overrides ",foot:Tc"

#####################################################
# Set prefix
#####################################################
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

#####################################################
# Reload config
#####################################################
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

#####################################################
# Vim style pane selection
#####################################################
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#####################################################
# Options
#####################################################
set -g mouse on
set -g default-shell /bin/zsh
set -g repeat-time 1000
set -g status-position top
set -g escape-time 0
set -g history-limit 10000

#####################################################
# Shift arrow / Alt vim keys to switch windows
#####################################################
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-H     previous-window
bind -n M-L     next-window

#####################################################
# Blueprint Slate colors
#####################################################
base="#1c2127"
surface="#292c32"
overlay="#3d444d"
dim="#5a6570"
muted="#6878a0"
text="#c8d4dc"
accent="#95a1aa"
green="#7ab87a"
yellow="#c9a84c"
red="#c96a6a"

# Status bar
set -g status-style                  "bg=$surface,fg=$text"
set -g status-left-length            40
set -g status-right-length           120
set -g status-left                   "#[bg=$muted,fg=$base,bold] #S #[bg=$surface,fg=$muted]"
set -g status-right                  "#[fg=$dim] %H:%M #[fg=$overlay]│#[fg=$dim] %d %b "

# Windows
set -g window-status-format          "#[fg=$dim] #I #W "
set -g window-status-current-format  "#[bg=$overlay,fg=$text,bold] #I #W "
set -g window-status-separator       ""

# Pane borders
set -g pane-border-style             "fg=$overlay"
set -g pane-active-border-style      "fg=$muted"

# Messages
set -g message-style                 "bg=$muted,fg=$base"
set -g message-command-style         "bg=$overlay,fg=$text"

# Mode (copy mode, etc)
set -g mode-style                    "bg=$muted,fg=$base"

#####################################################
# Split pane bindings
#####################################################
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

#####################################################
# Copy mode vi
#####################################################
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

#####################################################
# Plugins
#####################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Yank config
set -g @yank_action 'copy-pipe'

#####################################################
# TPM — keep at bottom
#####################################################
run '~/.config/tmux/plugins/tpm/tpm'